<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TaskFlow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Sora', 'sans-serif'] },
          colors: { primary: { DEFAULT: '#4f46e5', hover: '#4338ca' } }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 font-sans px-4 transition-colors duration-300">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="../index.html" class="text-3xl font-bold text-primary tracking-tight">📋 TaskFlow</a>
      <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Acesse sua conta para continuar</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-800 shadow-xl rounded-2xl p-8 flex flex-col gap-6">
      <h2 class="text-xl font-semibold text-slate-800 dark:text-white">Entrar</h2>

      <!-- Mensagem de erro/sucesso -->
      <div id="alertMsg" class="hidden text-sm px-4 py-3 rounded-xl"></div>

      <div class="flex flex-col gap-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">E-mail</label>
          <input
            type="email"
            id="email"
            placeholder="seu@email.com"
            autocomplete="email"
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary text-sm transition"
          >
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">Senha</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary text-sm transition"
          >
        </div>

        <button id="btnLogin"
          class="w-full mt-1 py-3 bg-primary hover:bg-primary-hover active:scale-95 text-white font-semibold rounded-xl transition-all shadow-sm text-sm">
          Entrar
        </button>
      </div>

      <p class="text-center text-sm text-slate-500 dark:text-slate-400">
        Não tem conta?
        <a href="cadastro.html" class="text-primary font-semibold hover:underline">Cadastre-se</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../script.js"></script>
</body>
</html>
