<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Sora', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#4f46e5', hover: '#4338ca', light: '#eef2ff' },
          },
          keyframes: {
            fadeIn: { from: { opacity: '0', transform: 'translateY(12px)' }, to: { opacity: '1', transform: 'translateY(0)' } }
          },
          animation: { fadeIn: 'fadeIn 0.25s ease-out' }
        }
      }
    }
  </script>

  <style>
    .task-done span { text-decoration: line-through; opacity: 0.55; }
    .task-done { background-color: #d1fae5 !important; }
    .dark .task-done { background-color: #064e3b !important; }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-300 font-sans">

  <!-- HEADER -->
  <header class="bg-primary shadow-lg sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
      <h1 class="text-white text-2xl font-bold tracking-tight">📋 TaskFlow</h1>

      <nav class="flex items-center gap-3">
        <!-- Exibido apenas quando deslogado -->
        <div id="authLinks" class="flex items-center gap-3">
          <a href="login.html" class="text-indigo-200 hover:text-white text-sm font-medium transition-colors">Login</a>
          <a href="cadastro.html" class="bg-white text-primary text-sm font-semibold px-4 py-1.5 rounded-full hover:bg-indigo-50 transition-colors">Cadastrar</a>
        </div>

        <!-- Exibido apenas quando logado -->
        <div id="userArea" class="hidden items-center gap-3">
          <span id="userEmail" class="text-indigo-200 text-sm hidden sm:block"></span>
          <a id="adminLink" href="admin.html" class="hidden bg-yellow-500 hover:bg-yellow-600 text-white text-sm font-medium px-3 py-1.5 rounded-full transition-colors">
            👤 Admin
          </a>
          <button id="btnLogout" class="bg-white/20 hover:bg-white/30 text-white text-sm font-medium px-4 py-1.5 rounded-full transition-colors">
            Sair
          </button>
        </div>

        <!-- Dark Mode Toggle -->
        <button id="btnDark" aria-label="Alternar modo escuro"
          class="ml-2 w-9 h-9 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 text-white transition-colors text-base">
          <img src="dark-mode.png" alt="">
        </button>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-5xl w-full mx-auto px-4 sm:px-6 py-10 flex flex-col gap-8">

    <!-- Alerta de login -->
    <div id="alertLogin" class="hidden bg-yellow-50 dark:bg-yellow-900/30 border border-yellow-300 dark:border-yellow-700 text-yellow-800 dark:text-yellow-200 text-sm px-4 py-3 rounded-xl">
      ⚠️ Faça <a href="login.html" class="underline font-semibold">login</a> para adicionar e gerenciar suas tarefas.
    </div>

    <!-- Input de tarefa -->
    <section class="flex gap-3 flex-wrap">
      <input
        type="text"
        id="taskInput"
        placeholder="Digite uma nova tarefa..."
        class="flex-1 min-w-0 px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary text-sm shadow-sm transition"
      >
      <button id="btnAdd"
        class="px-6 py-3 bg-primary hover:bg-primary-hover active:scale-95 text-white font-semibold rounded-xl shadow-sm transition-all text-sm">
        + Adicionar
      </button>
    </section>

    <!-- Lista de tarefas -->
    <section id="taskList"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    </section>

    <!-- Estado vazio -->
    <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-slate-400 dark:text-slate-600 text-center gap-3">
      <span class="text-5xl">✅</span>
      <p class="text-lg font-medium">Nenhuma tarefa ainda</p>
      <p class="text-sm">Adicione sua primeira tarefa acima!</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-slate-800 dark:bg-black text-slate-400 text-xs text-center py-4 mt-auto">
    Desenvolvido com HTML5 · Tailwind CSS · JavaScript
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="script.js"></script>
</body>
</html>
